<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goodnight Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fecfef 75%, #ff9a9e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', cursive;
            overflow: hidden;
            animation: backgroundShift 8s ease-in-out infinite;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        .message {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .name {
            color: #ff6b9d;
            font-size: 3.5rem;
            display: inline-block;
            min-width: 120px;
            transition: all 0.5s ease;
        }
        
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
            opacity: 0.8;
        }
        
        .heart:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s, 0s;
            color: #ff6b9d;
        }
        .heart:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 0.5s, 0.3s;
            color: #ff8fab;
        }
        .heart:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 1s, 0.6s;
            color: #ffb3c1;
        }
        .heart:nth-child(4) {
            bottom: 20%;
            right: 10%;
            animation-delay: 1.5s, 0.9s;
            color: #ff6b9d;
        }
        .heart:nth-child(5) {
            top: 50%;
            left: 5%;
            animation-delay: 2s, 1.2s;
            color: #ff8fab;
        }
        .heart:nth-child(6) {
            top: 60%;
            right: 25%;
            animation-delay: 2.5s, 1.5s;
            color: #ffb3c1;
        }
        .heart:nth-child(7) {
            bottom: 10%;
            left: 50%;
            animation-delay: 0.3s, 0.1s;
            color: #ff6b9d;
        }
        .heart:nth-child(8) {
            top: 30%;
            right: 40%;
            animation-delay: 0.8s, 0.4s;
            color: #ff8fab;
        }
        
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            animation: rise 4s linear infinite;
            opacity: 0;
        }
        
        .floating-heart:nth-child(odd) {
            color: #ff6b9d;
        }
        
        .floating-heart:nth-child(even) {
            color: #ff8fab;
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            color: #fff;
            font-size: 1rem;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        .star:nth-child(1) { top: 15%; left: 25%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; right: 30%; animation-delay: 0.5s; }
        .star:nth-child(3) { bottom: 40%; left: 15%; animation-delay: 1s; }
        .star:nth-child(4) { bottom: 20%; right: 20%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 35%; left: 45%; animation-delay: 0.3s; }
        .star:nth-child(6) { top: 45%; right: 50%; animation-delay: 0.8s; }
        
        @keyframes glow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 10px rgba(255,107,157,0.5); }
            to { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255,107,157,0.8); }
        }
        
        @keyframes backgroundShift {
            0%, 100% { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fecfef 75%, #ff9a9e 100%); }
            50% { background: linear-gradient(135deg, #fecfef 0%, #ff9a9e 25%, #ff9a9e 75%, #fecfef 100%); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes rise {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0.5);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1.2);
            }
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .name-change {
            animation: bounce 0.5s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            .message {
                font-size: 2rem;
            }
            .name {
                font-size: 2.5rem;
            }
            .heart {
                font-size: 1.5rem;
            }
            .star {
                font-size: 0.8rem;
            }
            .floating-heart {
                font-size: 1.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .message {
                font-size: 1.5rem;
            }
            .name {
                font-size: 2rem;
                min-width: 80px;
            }
            .heart {
                font-size: 1.2rem;
            }
            .star {
                font-size: 0.6rem;
            }
            .floating-heart {
                font-size: 1rem;
            }
            body {
                animation-duration: 12s; /* Slower background animation for mobile */
            }
        }
        
        @media (max-width: 360px) {
            .message {
                font-size: 1.2rem;
            }
            .name {
                font-size: 1.8rem;
                min-width: 60px;
            }
            .heart {
                font-size: 1rem;
            }
            .star {
                font-size: 0.5rem;
            }
            .floating-heart {
                font-size: 0.8rem;
            }
        }
        
        /* Reduce animation complexity on mobile for better performance */
        @media (max-width: 768px) {
            .heart {
                animation-duration: 4s, 3s; /* Slower animations */
            }
            .floating-heart {
                animation-duration: 6s linear infinite; /* Slower floating hearts */
            }
            .star {
                animation-duration: 3s ease-in-out infinite; /* Slower twinkling */
            }
        }
        
        /* Prevent text selection on mobile for better user experience */
        @media (max-width: 768px) {
            .message, .name {
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
            }
        }
        
        /* Optimize for touch devices */
        @media (hover: none) {
            .name {
                cursor: default;
            }
        }
    </style>
</head>
<body>
    <div class="stars">
        <span class="star">✨</span>
        <span class="star">⭐</span>
        <span class="star">✨</span>
        <span class="star">⭐</span>
        <span class="star">✨</span>
        <span class="star">⭐</span>
    </div>
    
    <div class="hearts-container">
        <span class="heart">💖</span>
        <span class="heart">💕</span>
        <span class="heart">💗</span>
        <span class="heart">💖</span>
        <span class="heart">💕</span>
        <span class="heart">💗</span>
        <span class="heart">💖</span>
        <span class="heart">💕</span>
    </div>
    
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <div class="container">
    <div class="message">
        goodnight <span class="name" id="nameDisplay">papa</span>
    </div>
</div>

<hr>

<h5 class="message">Swwweeeeeeettesstttttt dreamssssss🍓</h5>
    
    <script>
        const names = ['papa', 'picchi', 'cutu', 'dolly'];
        const nameDisplay = document.getElementById('nameDisplay');
        const floatingHeartsContainer = document.getElementById('floatingHearts');
        
        let currentIndex = 0;
        
        function changeName() {
            currentIndex = (currentIndex + 1) % names.length;
            const newName = names[currentIndex];
            
            // Add bounce animation
            nameDisplay.classList.add('name-change');
            
            // Change the name
            nameDisplay.textContent = newName;
            
            // Remove bounce animation after it completes
            setTimeout(() => {
                nameDisplay.classList.remove('name-change');
            }, 500);
            
            // Create floating hearts
            createFloatingHeart();
        }
        
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = '💖';
            
            // Random horizontal position
            heart.style.left = Math.random() * 100 + '%';
            
            // Random animation duration
            heart.style.animationDuration = (3 + Math.random() * 2) + 's';
            
            floatingHeartsContainer.appendChild(heart);
            
            // Remove heart after animation completes
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        
        // Change name every 2 seconds
        setInterval(changeName, 2000);
        
        // Create initial floating hearts
        setInterval(createFloatingHeart, 1000);
        
        // Create some floating hearts immediately
        for (let i = 0; i < 5; i++) {
            setTimeout(createFloatingHeart, i * 200);
        }
    </script>
</body>
</html>
