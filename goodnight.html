<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Goodnight Superwoman 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top left,#ff2e88 0%,transparent 20%),
    radial-gradient(circle at bottom right,#6f2cff 0%,transparent 25%),
    linear-gradient(135deg,#050505,#0d0d12,#14091d,#050505);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* BACKGROUND GLOW */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.18;
    animation: floatGlow 10s ease-in-out infinite;
}

.glow1{
    width:400px;
    height:400px;
    background:#ff2e88;
    top:-150px;
    left:-120px;
}

.glow2{
    width:350px;
    height:350px;
    background:#7b3cff;
    bottom:-120px;
    right:-120px;
}

@keyframes floatGlow{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-20px);
    }
}

/* STARS */

.stars{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
    background:white;
    opacity:.6;
    animation: twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
    }
    50%{
        opacity:1;
    }
}

/* FLOATING ICONS */

.floaters{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.float{
    position:absolute;
    bottom:-80px;
    opacity:.18;
    animation: floatUp linear infinite;
    filter:drop-shadow(0 0 12px rgba(255,255,255,.25));
}

@keyframes floatUp{

    0%{
        transform:
        translateY(0)
        rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:.18;
    }

    100%{
        transform:
        translateY(-120vh)
        rotate(180deg);
        opacity:0;
    }
}

/* MAIN CARD */

.card{
    width:min(92%,850px);
    padding:70px 55px;
    border-radius:36px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 20px 80px rgba(0,0,0,.55),
    inset 0 0 30px rgba(255,255,255,.03);

    position:relative;
    overflow:hidden;

    z-index:5;
}

/* SHINE */

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:-200%;
    width:200%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.05),
        transparent
    );

    animation: shine 7s linear infinite;
}

@keyframes shine{
    100%{
        left:200%;
    }
}

/* SUPER WOMAN TAG */

.tag{
    color:#ff4fa1;
    font-size:14px;
    font-weight:700;
    letter-spacing:5px;
    margin-bottom:25px;
    text-transform:uppercase;
}

/* TITLE */

.title{
    font-size:clamp(55px,8vw,105px);
    line-height:1;
    font-weight:800;
    color:white;

    text-shadow:
    0 0 18px rgba(255,255,255,.08),
    0 0 40px rgba(255,79,161,.2);

    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.02);
    }
}

.highlight{
    background:linear-gradient(
        90deg,
        #ff4fa1,
        #d08cff,
        #ffffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SUBTITLE */

.subtitle{
    margin-top:28px;
    font-size:18px;
    line-height:1.9;
    color:rgba(255,255,255,.72);
    max-width:650px;
}

/* DIVIDER */

.line{
    width:150px;
    height:2px;
    margin:35px 0;

    background:linear-gradient(
        to right,
        #ff4fa1,
        transparent
    );
}

/* QUOTE */

.quote{
    font-size:22px;
    font-weight:500;
    color:white;
    line-height:1.7;
    max-width:700px;
}

/* FOOTER */

.footer{
    margin-top:45px;
    display:flex;
    align-items:center;
    gap:14px;
    color:rgba(255,255,255,.5);
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* MOON */

.moon{
    position:absolute;
    top:45px;
    right:45px;

    width:85px;
    height:85px;

    border-radius:50%;
    background:#fff4cf;

    box-shadow:
    0 0 40px rgba(255,255,255,.6),
    0 0 90px rgba(255,255,255,.15);

    animation: moonFloat 6s ease-in-out infinite;
}

.moon::after{
    content:'';
    position:absolute;

    width:70px;
    height:70px;

    border-radius:50%;

    background:#0d0d12;

    top:-5px;
    left:16px;
}

@keyframes moonFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:55px 28px;
    }

    .quote{
        font-size:18px;
    }

    .subtitle{
        font-size:15px;
    }

    .moon{
        width:65px;
        height:65px;
        top:28px;
        right:28px;
    }

    .moon::after{
        width:54px;
        height:54px;
    }
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="stars" id="stars"></div>
<div class="floaters" id="floaters"></div>

<div class="card">

    <div class="moon"></div>

  

    <div class="title">
        Goodnight<br>
        <span class="highlight">Superwoman</span> 🌙
    </div>

  

    <div class="line"></div>


    <div class="footer">
        Strongest and prettiest🌕
    </div>

</div>

<script>

/* STARS */

const stars = document.getElementById('stars');

for(let i=0;i<90;i++){

    const star = document.createElement('div');

    star.classList.add('star');

    star.style.left = Math.random()*100 + 'vw';
    star.style.top = Math.random()*100 + 'vh';

    star.style.animationDuration =
    Math.random()*4 + 2 + 's';

    star.style.animationDelay =
    Math.random()*5 + 's';

    stars.appendChild(star);
}

/* FLOATING ICONS */

const icons = [
'🖤','✨','🌙','⚡','🦋','👑'
];

const floaters = document.getElementById('floaters');

for(let i=0;i<18;i++){

    const floater = document.createElement('div');

    floater.classList.add('float');

    floater.innerHTML =
    icons[Math.floor(Math.random()*icons.length)];

    floater.style.left =
    Math.random()*100 + 'vw';

    floater.style.fontSize =
    Math.random()*22 + 18 + 'px';

    floater.style.animationDuration =
    Math.random()*10 + 10 + 's';

    floater.style.animationDelay =
    Math.random()*8 + 's';

    floaters.appendChild(floater);
}

</script>

</body>
</html>
