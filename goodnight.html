<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>goodnight papa ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    font-family:'Outfit',sans-serif;

    background:
    linear-gradient(
        180deg,
        #ffd7ec 0%,
        #ffc2df 20%,
        #ffb3dc 40%,
        #ff9fd3 60%,
        #ff89c8 100%
    );

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* CLOUDS */

.cloud{

    position:absolute;

    background:rgba(255,255,255,.45);

    border-radius:100px;

    filter:blur(2px);

    animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:inherit;
    border-radius:50%;
}

.cloud1{
    width:180px;
    height:60px;
    top:12%;
    left:-220px;
    animation-duration:35s;
}

.cloud1::before{
    width:70px;
    height:70px;
    left:20px;
    top:-25px;
}

.cloud1::after{
    width:90px;
    height:90px;
    right:20px;
    top:-35px;
}

.cloud2{
    width:140px;
    height:50px;
    bottom:18%;
    left:-180px;
    animation-duration:45s;
    opacity:.5;
}

.cloud2::before{
    width:60px;
    height:60px;
    left:18px;
    top:-20px;
}

.cloud2::after{
    width:70px;
    height:70px;
    right:15px;
    top:-25px;
}

@keyframes cloudMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(140vw);
    }
}

/* STARS */

.star{
    position:absolute;
    color:white;
    opacity:.8;
    animation:starBlink 3s infinite ease-in-out;
}

@keyframes starBlink{

    0%,100%{
        opacity:.2;
        transform:scale(1);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }
}

/* MAIN WRAP */

.wrapper{
    position:relative;
    z-index:5;
}

/* POLAROID */

.polaroid{

    width:min(92vw,430px);

    background:white;

    padding:22px 22px 145px;

    border-radius:18px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.18);

    transform:rotate(-3deg);

    animation:floatCard 5s ease-in-out infinite;

    position:relative;

    overflow:visible;
}

@keyframes floatCard{

    0%,100%{
        transform:
        rotate(-3deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(-1deg)
        translateY(-12px);
    }
}

/* PHOTO AREA */

.photo{

    height:470px;

    border-radius:12px;

    overflow:hidden;

    position:relative;

    background:
    linear-gradient(
        180deg,
        #6dc5ff 0%,
        #98d7ff 30%,
        #ffd4ea 100%
    );
}

/* MOON */

.moon{

    position:absolute;

    top:55px;
    right:55px;

    width:90px;
    height:90px;

    border-radius:50%;

    background:#fff7db;

    box-shadow:
    0 0 30px rgba(255,255,255,.8);

}

.moon::after{

    content:'';

    position:absolute;

    width:72px;
    height:72px;

    border-radius:50%;

    background:#98d7ff;

    top:-6px;
    left:18px;
}

/* HILLS */

.hill1,
.hill2,
.hill3{

    position:absolute;

    border-radius:50% 50% 0 0;
}

.hill1{
    width:520px;
    height:180px;
    background:#ff91c9;
    bottom:-40px;
    left:-60px;
}

.hill2{
    width:420px;
    height:150px;
    background:#ff74ba;
    bottom:-55px;
    right:-120px;
}

.hill3{
    width:360px;
    height:110px;
    background:#ff5aac;
    bottom:-40px;
    left:20px;
}

/* FLOATING HEARTS */

.hearts{
    position:absolute;
    inset:0;
}

.heart{

    position:absolute;

    font-size:18px;

    animation:heartFloat linear infinite;

    opacity:.7;
}

@keyframes heartFloat{

    0%{
        transform:
        translateY(0px)
        scale(.8);
        opacity:0;
    }

    20%{
        opacity:.8;
    }

    100%{
        transform:
        translateY(-120px)
        scale(1.2);
        opacity:0;
    }
}

/* TEXT */

/* TEXT */

.bottom{

    position:absolute;

    left:0;
    right:0;

    bottom:28px;

    text-align:center;

    z-index:20;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;
}

.goodnight{

    font-family:'Caveat',cursive;

    font-size:58px;

    color:#ff5ea9;

    line-height:1.1;

    display:block;

    margin-bottom:2px;

    text-shadow:
    0 3px 10px rgba(255,94,169,.25);
}

.papa{

    display:block;

    font-size:68px;

    font-weight:700;

    color:#ff3f96;

    line-height:1;

    text-shadow:
    0 4px 14px rgba(255,63,150,.25);
}
/* TAPE */

.tape{

    position:absolute;

    width:130px;
    height:32px;

    background:
    repeating-linear-gradient(
        45deg,
        rgba(255,255,255,.55),
        rgba(255,255,255,.55) 10px,
        rgba(255,255,255,.35) 10px,
        rgba(255,255,255,.35) 20px
    );

    top:-14px;

    border-radius:6px;

    backdrop-filter:blur(2px);
}

.tape1{
    left:30px;
    transform:rotate(-12deg);
}

.tape2{
    right:30px;
    transform:rotate(12deg);
}

/* SPARKLES */

.sparkle{

    position:absolute;

    color:white;

    font-size:22px;

    opacity:.85;

    animation:sparkle 4s infinite ease-in-out;
}

@keyframes sparkle{

    0%,100%{
        transform:scale(1) rotate(0deg);
    }

    50%{
        transform:scale(1.4) rotate(20deg);
    }
}

/* MOBILE */

@media(max-width:600px){

    .photo{
        height:390px;
    }

    .goodnight{
        font-size:42px;
    }

    .papa{
        font-size:58px;
    }

    .moon{
        width:70px;
        height:70px;
    }

    .moon::after{
        width:55px;
        height:55px;
    }
}

</style>
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="sparkle" style="top:12%; left:10%;">✨</div>
<div class="sparkle" style="top:18%; right:14%; animation-delay:1s;">⭐</div>
<div class="sparkle" style="bottom:20%; left:16%; animation-delay:2s;">✨</div>

<script>

/* STARS */

for(let i=0;i<35;i++){

    const star =
    document.createElement('div');

    star.className = 'star';

    star.innerHTML = '✦';

    star.style.left =
    Math.random()*100 + 'vw';

    star.style.top =
    Math.random()*100 + 'vh';

    star.style.fontSize =
    Math.random()*10 + 10 + 'px';

    star.style.animationDuration =
    Math.random()*3 + 2 + 's';

    document.body.appendChild(star);
}

</script>

<div class="wrapper">

    <div class="polaroid">

        <div class="tape tape1"></div>
        <div class="tape tape2"></div>

        <div class="photo">

            <div class="moon"></div>

            <div class="hearts" id="hearts"></div>

            <div class="hill1"></div>
            <div class="hill2"></div>
            <div class="hill3"></div>

        </div>

        <div class="bottom">

            <div class="goodnight">
                goodnight
            </div>

            <span class="papa">
                papa 💖
            </span>

        </div>

    </div>

</div>

<script>

/* FLOATING HEARTS */

const hearts =
document.getElementById('hearts');

for(let i=0;i<14;i++){

    const heart =
    document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML = '💗';

    heart.style.left =
    Math.random()*100 + '%';

    heart.style.bottom =
    Math.random()*40 + 'px';

    heart.style.fontSize =
    Math.random()*12 + 14 + 'px';

    heart.style.animationDuration =
    Math.random()*4 + 3 + 's';

    heart.style.animationDelay =
    Math.random()*5 + 's';

    hearts.appendChild(heart);
}

</script>

</body>
</html>
