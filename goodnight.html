<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodnight 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Nunito:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --baby-pink: #ffd6e7;
    --blush: #ffb3c6;
    --lavender: #e8d5f5;
    --peach: #ffd7b5;
    --soft-white: #fff5f9;
    --rose: #ff85a2;
    --lilac: #d4b8e0;
    --cream: #fff0f3;
    --glow: rgba(255, 182, 193, 0.4);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  body {
    background: radial-gradient(ellipse at 20% 20%, #ffe0f0 0%, #f5d0ef 20%, #e8d5f5 45%, #ffd6e7 65%, #ffecd2 100%);
    animation: bgShift 12s ease-in-out infinite alternate;
    position: relative;
  }

  @keyframes bgShift {
    0%   { background: radial-gradient(ellipse at 20% 20%, #ffe0f0 0%, #f5d0ef 20%, #e8d5f5 45%, #ffd6e7 65%, #ffecd2 100%); }
    50%  { background: radial-gradient(ellipse at 80% 60%, #fde8f5 0%, #e8d5f5 25%, #ffd6e7 50%, #ffe4ec 75%, #f5e6ff 100%); }
    100% { background: radial-gradient(ellipse at 40% 80%, #ffd6e7 0%, #f0d5ff 30%, #ffe0eb 55%, #ffeaf5 80%, #ecdcff 100%); }
  }

  /* ── BOKEH LAYER ── */
  .bokeh-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bokeh {
    position: absolute; border-radius: 50%;
    filter: blur(40px); opacity: 0;
    animation: bokehFloat linear infinite;
  }

  @keyframes bokehFloat {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    15%  { opacity: 0.55; }
    85%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-110vh) scale(1.3); }
  }

  /* ── STARS ── */
  .stars-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .star {
    position: absolute; width: 3px; height: 3px;
    border-radius: 50%; background: #fff;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.9);
    animation: twinkle ease-in-out infinite;
  }
  .star.big { width: 5px; height: 5px; box-shadow: 0 0 10px 3px rgba(255,200,220,0.9); }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1.4); }
  }

  /* ── SPARKLES ── */
  .sparkle {
    position: absolute; font-size: 12px;
    animation: sparklePop ease-in-out infinite;
    pointer-events: none; z-index: 2;
  }
  @keyframes sparklePop {
    0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    40%, 60% { opacity: 1;  transform: scale(1.2) rotate(180deg); }
  }

  /* ── FLOATING HEARTS ── */
  .heart {
    position: absolute; pointer-events: none; z-index: 2;
    font-size: 14px;
    animation: heartDrift ease-in-out infinite;
    filter: drop-shadow(0 0 4px rgba(255,120,150,0.6));
  }
  @keyframes heartDrift {
    0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0.5); }
    20%  { opacity: 0.8; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) translateX(30px) scale(1.1); }
  }

  /* ── MOON ── */
  .moon {
    position: fixed; top: 40px; right: 60px;
    font-size: 70px; z-index: 3;
    filter: drop-shadow(0 0 20px rgba(255,210,230,0.9)) drop-shadow(0 0 40px rgba(255,182,193,0.6));
    animation: moonGlow 4s ease-in-out infinite;
    cursor: default; user-select: none;
  }
  @keyframes moonGlow {
    0%, 100% { transform: scale(1) rotate(-5deg); filter: drop-shadow(0 0 20px rgba(255,210,230,0.9)) drop-shadow(0 0 40px rgba(255,182,193,0.6)); }
    50%       { transform: scale(1.07) rotate(3deg); filter: drop-shadow(0 0 35px rgba(255,210,230,1)) drop-shadow(0 0 70px rgba(255,182,193,0.9)); }
  }

  /* ── CLOUDS ── */
  .cloud {
    position: fixed; pointer-events: none; z-index: 2;
    font-size: 48px; opacity: 0.35;
    filter: blur(1px);
    animation: cloudDrift linear infinite;
  }
  @keyframes cloudDrift {
    0%   { transform: translateX(-120px); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.25; }
    100% { transform: translateX(110vw); opacity: 0; }
  }

  /* ── FLOATING TEXTS ── */
  .float-text {
    position: fixed; pointer-events: none; z-index: 4;
    font-family: 'Great Vibes', cursive;
    white-space: nowrap;
    text-shadow: 0 0 20px rgba(255,120,160,0.5);
    animation: floatText linear infinite;
  }
  @keyframes floatText {
    0%   { opacity: 0; transform: translateY(0px) translateX(0px); }
    10%  { opacity: 1; }
    85%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(var(--dy)) translateX(var(--dx)); }
  }

  /* ── CENTER CARD ── */
  .card-wrap {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .glass-card {
    background: rgba(255, 240, 248, 0.35);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1.5px solid rgba(255, 182, 210, 0.5);
    border-radius: 36px;
    padding: 52px 64px;
    max-width: 520px; width: 90%;
    text-align: center;
    box-shadow:
      0 8px 40px rgba(255,160,190,0.25),
      0 2px 8px rgba(255,200,220,0.2),
      inset 0 1px 0 rgba(255,255,255,0.7);
    animation: cardBreath 6s ease-in-out infinite;
    pointer-events: all;
    position: relative; overflow: hidden;
  }
  .glass-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 60%);
    border-radius: inherit; pointer-events: none;
  }

  @keyframes cardBreath {
    0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 8px 40px rgba(255,160,190,0.25), 0 2px 8px rgba(255,200,220,0.2), inset 0 1px 0 rgba(255,255,255,0.7); }
    50%       { transform: scale(1.015) translateY(-4px); box-shadow: 0 16px 60px rgba(255,160,190,0.4), 0 4px 16px rgba(255,200,220,0.3), inset 0 1px 0 rgba(255,255,255,0.7); }
  }

  .card-emoji { font-size: 48px; display: block; margin-bottom: 12px; animation: floatEmoji 3s ease-in-out infinite; }
  @keyframes floatEmoji {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  .card-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(38px, 7vw, 58px);
    color: #c4506a;
    line-height: 1.15;
    letter-spacing: 1px;
    text-shadow: 0 2px 12px rgba(200,80,110,0.25);
    margin-bottom: 10px;
  }

  .card-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(15px, 3vw, 20px);
    color: #9b5b7a;
    letter-spacing: 0.5px;
    line-height: 1.7;
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .card-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin: 18px 0;
    color: rgba(196,80,106,0.5); font-size: 18px;
  }
  .card-divider::before, .card-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(196,80,106,0.35), transparent);
  }

  .card-names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(18px, 3.5vw, 26px);
    color: #b8608a;
    line-height: 2;
    text-shadow: 0 1px 8px rgba(180,80,120,0.15);
  }

  /* ── MUSIC BUTTON ── */
  .music-btn {
    position: fixed; bottom: 32px; right: 32px; z-index: 20;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,220,235,0.6);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255,150,185,0.5);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(255,100,150,0.25);
    transition: transform 0.3s, box-shadow 0.3s;
    animation: btnPulse 3s ease-in-out infinite;
  }
  .music-btn:hover { transform: scale(1.12); box-shadow: 0 6px 28px rgba(255,100,150,0.4); }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(255,100,150,0.25); }
    50%       { box-shadow: 0 4px 30px rgba(255,100,150,0.5), 0 0 0 6px rgba(255,150,185,0.1); }
  }

  /* ── TIME ── */
  .night-time {
    position: fixed; bottom: 32px; left: 32px; z-index: 20;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: rgba(160,80,110,0.7);
    letter-spacing: 2px; font-style: italic;
  }
</style>
</head>
<body>

<!-- Bokeh -->
<div class="bokeh-wrap" id="bokehWrap"></div>
<!-- Stars -->
<div class="stars-wrap" id="starsWrap"></div>

<!-- Moon -->
<div class="moon">🌙</div>

<!-- Clouds -->
<div class="cloud" style="top:12%;animation-duration:45s;animation-delay:-10s;font-size:40px;">☁️</div>
<div class="cloud" style="top:28%;animation-duration:60s;animation-delay:-25s;font-size:56px;">☁️</div>
<div class="cloud" style="top:55%;animation-duration:50s;animation-delay:-5s;font-size:32px;">☁️</div>
<div class="cloud" style="top:75%;animation-duration:70s;animation-delay:-35s;font-size:44px;">☁️</div>

<!-- Floating text container -->
<div id="floatWrap"></div>

<!-- Center Card -->
<div class="card-wrap">
  <div class="glass-card">
    <span class="card-emoji">🌸</span>
    <div class="card-title">Sweet Dreams</div>
    <div class="card-sub">Sleep well, pichhhhiiiiiiii 💕<br>bhotttthhh dreamssss</div>
    <div class="card-divider">✦</div>
    <div class="card-sub" style="margin-bottom:0; font-size: clamp(13px,2.5vw,17px); opacity:0.7;">Wishing you the softest, warmest night 🌙</div>
  </div>
</div>

<!-- Music button -->
<button class="music-btn" id="musicBtn" title="Toggle ambient music">🎵</button>

<!-- Time -->
<div class="night-time" id="nightTime"></div>

<script>
// ── TIME ──
function updateTime() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('nightTime').textContent = `${h} : ${m}`;
}
updateTime(); setInterval(updateTime, 30000);

// ── RANDOM ──
const rnd = (a, b) => Math.random() * (b - a) + a;
const rndInt = (a, b) => Math.floor(rnd(a, b));
const pick = arr => arr[rndInt(0, arr.length)];

// ── BOKEH ──
const bokehColors = [
  'rgba(255,182,193,0.5)','rgba(221,160,221,0.45)','rgba(255,218,185,0.4)',
  'rgba(255,192,203,0.5)','rgba(216,191,216,0.4)','rgba(255,240,245,0.5)'
];
const bw = document.getElementById('bokehWrap');
for (let i = 0; i < 18; i++) {
  const b = document.createElement('div');
  b.className = 'bokeh';
  const size = rnd(60, 200);
  b.style.cssText = `
    left:${rnd(0,100)}%; top:${rnd(20,110)}%;
    width:${size}px; height:${size}px;
    background:${pick(bokehColors)};
    animation-duration:${rnd(14,30)}s;
    animation-delay:-${rnd(0,20)}s;
  `;
  bw.appendChild(b);
}

// ── STARS ──
const sw = document.getElementById('starsWrap');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  s.className = 'star' + (Math.random() > 0.8 ? ' big' : '');
  s.style.cssText = `
    left:${rnd(0,100)}%; top:${rnd(0,100)}%;
    animation-duration:${rnd(1.5,4.5)}s;
    animation-delay:-${rnd(0,4)}s;
  `;
  sw.appendChild(s);
}

// Sparkles
const sparkleEmojis = ['✦','✧','⋆','✩','✫','·'];
for (let i = 0; i < 25; i++) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.textContent = pick(sparkleEmojis);
  sp.style.cssText = `
    left:${rnd(0,100)}%; top:${rnd(0,100)}%;
    font-size:${rnd(8,18)}px;
    color:rgba(255,${rndInt(130,200)},${rndInt(150,210)},0.8);
    animation-duration:${rnd(2,5)}s;
    animation-delay:-${rnd(0,5)}s;
  `;
  sw.appendChild(sp);
}

// Floating hearts
for (let i = 0; i < 20; i++) {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = pick(['💕','💗','💖','💓','🌸','💝','🩷']);
  h.style.cssText = `
    left:${rnd(0,100)}%; top:${rnd(20,90)}%;
    font-size:${rnd(12,22)}px;
    animation-duration:${rnd(5,12)}s;
    animation-delay:-${rnd(0,10)}s;
  `;
  sw.appendChild(h);
}

// ── FLOATING TEXTS ──
const texts = [
  { text: 'Goodnight Vaishu 🌙',      color: '#c45070', minS: 24, maxS: 40 },
  { text: 'Goodnight Papa 💖',         color: '#b05090', minS: 22, maxS: 36 },
  { text: 'Goodnight Pichithalli ✨',  color: '#9060a8', minS: 20, maxS: 32 },
  { text: 'Goodnight Au 💤',           color: '#b8608a', minS: 22, maxS: 38 },
  { text: 'Goodnight Vaishu 🌙',      color: '#d4608a', minS: 18, maxS: 28 },
  { text: 'Goodnight Papa 💖',         color: '#c070a0', minS: 18, maxS: 26 },
  { text: 'Goodnight Pichithalli ✨',  color: '#a078c0', minS: 16, maxS: 24 },
  { text: 'Goodnight Au 💤',           color: '#c060a8', minS: 18, maxS: 30 },
  { text: 'Sweet dreams 🌸',           color: '#c06080', minS: 16, maxS: 24 },
  { text: 'Sleep tight 💫',            color: '#a06898', minS: 14, maxS: 20 },
  { text: '🌙 Rest well',             color: '#9870b0', minS: 14, maxS: 20 },
];

const fw = document.getElementById('floatWrap');
function spawnFloatText() {
  const item = pick(texts);
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = item.text;

  const dirs = [
    { dx: rnd(-80, 80), dy: rnd(-160, -80) },
    { dx: rnd(80, 200),  dy: rnd(-60, 60)  },
    { dx: rnd(-200,-80), dy: rnd(-60, 60)  },
    { dx: rnd(-60,60),   dy: rnd(80, 160)  },
  ];
  const dir = pick(dirs);

  el.style.setProperty('--dx', dir.dx + 'px');
  el.style.setProperty('--dy', dir.dy + 'px');
  el.style.cssText += `
    left:${rnd(3,90)}%; top:${rnd(5,90)}%;
    font-size:${rnd(item.minS, item.maxS)}px;
    color:${item.color};
    opacity:0;
    animation-duration:${rnd(8,16)}s;
    animation-delay:0s;
    --dx:${dir.dx}px; --dy:${dir.dy}px;
    filter: drop-shadow(0 0 8px ${item.color}55);
  `;

  fw.appendChild(el);
  setTimeout(() => el.remove(), 16000);
}

// Seed initial texts
for (let i = 0; i < 18; i++) {
  setTimeout(spawnFloatText, i * 500);
}
setInterval(spawnFloatText, 1400);

// ── AMBIENT MUSIC (Web Audio) ──
let audioCtx = null, playing = false, musicNodes = [];

function createAmbientMusic() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);
  master.connect(audioCtx.destination);

  const reverb = audioCtx.createConvolver();
  const reverbLen = audioCtx.sampleRate * 3;
  const reverbBuf = audioCtx.createBuffer(2, reverbLen, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = reverbBuf.getChannelData(c);
    for (let i = 0; i < reverbLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/reverbLen, 2.5);
  }
  reverb.buffer = reverbBuf;
  const reverbGain = audioCtx.createGain(); reverbGain.gain.value = 0.5;
  reverb.connect(reverbGain); reverbGain.connect(master);

  // Gentle chord tones — C maj pentatonic
  const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
  function playNote(freq, time, dur) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(0.015, time + 0.3);
    env.gain.linearRampToValueAtTime(0.008, time + dur * 0.6);
    env.gain.linearRampToValueAtTime(0, time + dur);
    osc.connect(env); env.connect(reverb); env.connect(master);
    osc.start(time); osc.stop(time + dur + 0.1);
    musicNodes.push(osc);
  }

  let t = audioCtx.currentTime + 0.5;
  function scheduleLoop() {
    const chord = pick([[261.63,329.63,392.00],[293.66,369.99,440.00],[246.94,311.13,392.00],[261.63,329.63,523.25]]);
    chord.forEach((f, i) => playNote(f, t + i*0.12, rnd(3, 6)));
    t += rnd(3.5, 6);
    if (playing) setTimeout(scheduleLoop, (t - audioCtx.currentTime - 1) * 1000);
  }
  scheduleLoop();
  return master;
}

let masterGain = null;
document.getElementById('musicBtn').addEventListener('click', () => {
  const btn = document.getElementById('musicBtn');
  if (!playing) {
    playing = true;
    masterGain = createAmbientMusic();
    btn.textContent = '🔇';
    btn.title = 'Pause music';
  } else {
    playing = false;
    if (masterGain) {
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
      setTimeout(() => { audioCtx.close(); audioCtx = null; musicNodes = []; }, 1200);
    }
    btn.textContent = '🎵';
    btn.title = 'Play ambient music';
  }
});
</script>
</body>
</html>
